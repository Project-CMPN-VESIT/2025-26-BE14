<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>

    <style>
        body {
            margin: 0;
            padding: 30px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f6f8fc;
            color: #0a2540;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .grid {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .rank {
            font-size: 14px;
            color: #2563eb;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .img-box {
            text-align: center;
            margin-bottom: 10px;
        }

        .img-box img {
            max-width: 160px;
            max-height: 160px;
            object-fit: contain;
        }

        .meta {
            font-size: 14px;
            margin-bottom: 6px;
        }

        .reason {
            font-size: 13px;
            color: #444;
            background: #f1f5ff;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        .back {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h2>Best to Worst Product Recommendations</h2>

<div class="grid">
{% for p in data %}
    <div class="card">
        <div class="rank">Rank #{{ p.rank }}</div>
        <div class="title">{{ p.title }}</div>

        <div class="img-box">
            <img src="{{ p.image }}" alt="product image">
        </div>

        <div class="meta"><b>Price:</b> ₹{{ p.price }}</div>
        <div class="meta"><b>Rating:</b> {{ p.rating }}</div>

        <a href="{{ p.url }}" target="_blank">View Product</a>

        <div class="reason">
            {{ p.reason }}
        </div>
    </div>
{% endfor %}
</div>

<div class="back">
    <a href="/">← Search another product</a>
</div>

</body>
</html>
