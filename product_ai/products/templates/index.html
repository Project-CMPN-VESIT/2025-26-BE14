<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Recommendation System</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f8f9fc, #eef1f7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 14px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #0a2540;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }

        button:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            display: none;
            margin: auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
<div class="container">
    <h2>Product Recommendation System</h2>
    <p>Compare Amazon & Flipkart using AI-powered ranking</p>

    <form method="post" action="/analyze/" onsubmit="startLoading()">
        {% csrf_token %}
        <input
            type="text"
            name="product"
            placeholder="Search product"
            required
        />

        <button id="analyzeBtn" type="submit">
            <span id="btnText">Analyze</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </form>
</div>

<script>
    function startLoading() {
        const btn = document.getElementById("analyzeBtn");
        document.getElementById("btnText").style.display = "none";
        document.getElementById("spinner").style.display = "block";
        btn.disabled = true;
    }
</script>
</body>
</html>
